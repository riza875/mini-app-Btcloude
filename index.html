<!DOCTYPE html>
<html lang="id" style="background:#0a0c0f!important">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BTcloude - Login</title>
<!-- Telegram Mini App SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
html,body{background:#0a0c0f!important;background-color:#0a0c0f!important}
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0c0f;--card:#111418;--card2:#161b22;--orange:#7dd3fc;--og:rgba(125,211,252,0.18);--text:#f1f5f9;--muted:#64748b;--dim:#94a3b8;--border:rgba(125,211,252,0.2);--b2:rgba(255,255,255,0.06);--red:#ef4444}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;background:radial-gradient(ellipse at 50% 20%,rgba(125,211,252,0.1),transparent 65%),radial-gradient(ellipse at 80% 80%,rgba(59,130,246,0.06),transparent 50%)}
#main-card{display:none;width:100%;max-width:420px}
.card{background:transparent;border:none;border-radius:0;padding:0;box-shadow:none}
.logo{text-align:center;margin-bottom:40px}
.logo-ring{width:100px;height:100px;margin:0 auto 20px;background:var(--og);border:2px solid var(--orange);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.2rem;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(125,211,252,0.2)}50%{box-shadow:0 0 30px 12px rgba(125,211,252,0.15)}}
.logo h1{font-family:'Orbitron',sans-serif;font-size:2rem;color:var(--orange);letter-spacing:6px}
.logo p{color:var(--muted);font-size:.9rem;margin-top:8px;letter-spacing:1px}
.tabs{display:grid;grid-template-columns:1fr 1fr;background:var(--card2);border-radius:12px;padding:4px;margin-bottom:28px;gap:4px}
.tab{padding:11px;border:none;background:transparent;color:var(--muted);font-family:'Orbitron',sans-serif;font-size:.75rem;letter-spacing:1px;border-radius:9px;cursor:pointer;transition:all .25s}
.tab.active{background:var(--orange);color:#fff}
.form{display:none;flex-direction:column;gap:16px}
.form.active{display:flex}
.field{display:flex;flex-direction:column;gap:7px}
.field label{font-size:.78rem;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;font-weight:600}
.field input{padding:13px 16px;background:var(--card2);border:1.5px solid var(--b2);border-radius:12px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:1rem;outline:none;transition:border .2s}
.field input:focus{border-color:var(--orange)}
.field input::placeholder{color:var(--muted)}
.btn-main{padding:15px;background:var(--orange);color:#fff;border:none;border-radius:13px;font-family:'Orbitron',sans-serif;font-size:.82rem;letter-spacing:2px;cursor:pointer;font-weight:700;width:100%;transition:all .2s}
.btn-main:disabled{opacity:.6;cursor:not-allowed}
.divider{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:.8rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--b2)}
.btn-google{display:flex;align-items:center;justify-content:center;gap:12px;padding:15px 20px;background:rgba(125,211,252,0.08);border:1.5px solid rgba(125,211,252,0.3);color:var(--text);border-radius:14px;font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;letter-spacing:.5px;cursor:pointer;width:100%;transition:all .25s;white-space:nowrap}
.btn-google:hover{border-color:var(--orange);background:rgba(125,211,252,0.15);box-shadow:0 0 20px rgba(125,211,252,0.15)}
.err{color:var(--red);font-size:.85rem;text-align:center;min-height:18px;font-weight:600;margin-top:4px}
.full-loading{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.full-loading.hide{display:none}
.spinner{width:55px;height:55px;border:3px solid var(--b2);border-top-color:var(--orange);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmerText{0%{background-position:0%}100%{background-position:200%}}
.full-loading p{font-family:'Orbitron',sans-serif;font-size:.8rem;color:var(--orange);letter-spacing:2px}
.overlay{display:none;position:fixed;inset:0;background:rgba(10,12,15,.85);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.overlay.show{display:flex}
.overlay .spinner{width:50px;height:50px}
.overlay p{font-family:'Orbitron',sans-serif;font-size:.8rem;color:var(--orange);letter-spacing:2px}
</style>
</head>
<body style="background:#0a0c0f;background-color:#0a0c0f;min-height:100vh">

<div class="full-loading" id="full-loading">
  <!-- Logo Bitcoin biru animasi -->
  <div style="position:relative;width:90px;height:90px;margin-bottom:4px">
    <!-- Ring spinner -->
    <svg style="position:absolute;inset:0;animation:spin 1.2s linear infinite" width="90" height="90" viewBox="0 0 90 90">
      <circle cx="45" cy="45" r="40" fill="none" stroke="rgba(125,211,252,0.15)" stroke-width="3"/>
      <circle cx="45" cy="45" r="40" fill="none" stroke="#7dd3fc" stroke-width="3" stroke-linecap="round" stroke-dasharray="60 190"/>
    </svg>
    <!-- Bitcoin icon tengah -->
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">
      <svg width="48" height="48" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" style="filter:drop-shadow(0 0 10px #7dd3fc)">
        <path d="M46.1 27.9c.6-4.2-2.6-6.5-7-8l1.4-5.7-3.5-.9-1.4 5.5c-.9-.2-1.9-.5-2.8-.7l1.4-5.6-3.5-.9-1.4 5.7c-.8-.2-1.5-.4-2.2-.6l-4.8-1.2-.9 3.7s2.6.6 2.5.6c1.4.4 1.7 1.3 1.6 2l-1.6 6.4c.1 0 .2.1.4.1l-.4-.1-2.2 8.9c-.2.4-.6 1-1.5.8.03.04-2.5-.6-2.5-.6L17 41.5l4.6 1.1c.8.2 1.7.4 2.5.7l-1.5 5.8 3.5.9 1.4-5.7c.9.3 1.9.5 2.8.7l-1.4 5.7 3.5.9 1.5-5.8c6.1 1.2 10.7.7 12.6-4.8 1.6-4.4-.1-6.9-3.3-8.6 2.3-.5 4.1-2 4.4-5zm-7.9 11.1c-1.1 4.4-8.7 2-11.2 1.4l2-8c2.5.6 10.4 1.8 9.2 6.6zm1.1-11.2c-1 4-7.3 2-9.3 1.5l1.8-7.3c2 .5 8.5 1.4 7.5 5.8z" fill="#7dd3fc"/>
      </svg>
    </div>
  </div>
  <p style="font-family:'Orbitron',sans-serif;font-size:1.1rem;letter-spacing:4px;background:linear-gradient(90deg,#7dd3fc,#bae6fd,#7dd3fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;background-size:200%;animation:shimmerText 2s linear infinite">BTcloude</p>
  <p style="font-size:.72rem;color:var(--muted);letter-spacing:2px;margin-top:-8px">MEMUAT...</p>
</div>

<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <p>MEMPROSES...</p>
</div>

<div id="main-card">
<div class="card">
  <div class="logo">
    <div class="logo-ring">
      <!-- Bitcoin SVG logo warna biru -->
      <svg width="44" height="44" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="32" fill="none"/>
        <path d="M46.1 27.9c.6-4.2-2.6-6.5-7-8l1.4-5.7-3.5-.9-1.4 5.5c-.9-.2-1.9-.5-2.8-.7l1.4-5.6-3.5-.9-1.4 5.7c-.8-.2-1.5-.4-2.2-.6l-4.8-1.2-.9 3.7s2.6.6 2.5.6c1.4.4 1.7 1.3 1.6 2l-1.6 6.4c.1 0 .2.1.4.1l-.4-.1-2.2 8.9c-.2.4-.6 1-1.5.8.03.04-2.5-.6-2.5-.6L17 41.5l4.6 1.1c.8.2 1.7.4 2.5.7l-1.5 5.8 3.5.9 1.4-5.7c.9.3 1.9.5 2.8.7l-1.4 5.7 3.5.9 1.5-5.8c6.1 1.2 10.7.7 12.6-4.8 1.6-4.4-.1-6.9-3.3-8.6 2.3-.5 4.1-2 4.4-5zm-7.9 11.1c-1.1 4.4-8.7 2-11.2 1.4l2-8c2.5.6 10.4 1.8 9.2 6.6zm1.1-11.2c-1 4-7.3 2-9.3 1.5l1.8-7.3c2 .5 8.5 1.4 7.5 5.8z" fill="#7dd3fc"/>
      </svg>
    </div>
    <h1>BTcloude</h1>
  </div>

  <div style="display:flex;flex-direction:column;gap:14px;margin-top:8px">
    <p style="text-align:center;color:var(--dim);font-size:.88rem;line-height:1.6">Masuk atau daftar otomatis<br/>menggunakan akun Google kamu</p>
    <button class="btn-google" onclick="doGoogleLogin()">
      <svg width="22" height="22" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Masuk / Daftar dengan Google
    </button>
    <p style="text-align:center;color:var(--muted);font-size:.75rem">Dengan masuk, kamu menyetujui syarat & ketentuan BTcloude</p>
  </div>

  <p class="err" id="err-msg"></p>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, where, getDocs, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCObu2ErcXlHD0SKJ3BU_Iiw3Dm4hI2FV8",
  authDomain: "guppycoin-58f91.firebaseapp.com",
  projectId: "guppycoin-58f91",
  storageBucket: "guppycoin-58f91.firebasestorage.app",
  messagingSenderId: "374633980019",
  appId: "1:374633980019:web:d23e33eebe19a324de0a06",
  measurementId: "G-EYHJVR46BD"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const gProvider = new GoogleAuthProvider();
gProvider.setCustomParameters({ prompt: 'select_account' });

let authChecked = false;

function showOverlay(){ document.getElementById("overlay").classList.add("show"); }
function hideOverlay(){ document.getElementById("overlay").classList.remove("show"); }
function showErr(msg){ document.getElementById("err-msg").textContent = msg; hideOverlay(); }
function clearErr(){ document.getElementById("err-msg").textContent = ""; }

function showLoginPage(){
  document.getElementById("full-loading").classList.add("hide");
  document.getElementById("main-card").style.display = "block";
}

function goToDashboard(){
  window.location.href = "dashboard.html";
}

function genRefCode(uid){ return "OX" + uid.substring(0,6).toUpperCase(); }

async function saveUserToDB(user, refCode=""){
  try{
    const ref = doc(db, "users", user.uid);
    const snap = await getDoc(ref);
    if(!snap.exists()){
      await setDoc(ref, {
        uid: user.uid,
        name: user.displayName || "Miner",
        email: user.email,
        points: 0, totalMined: 0, totalWithdraw: 0,
        lastMined: null,
        referralCode: genRefCode(user.uid),
        referredBy: refCode,
        referralCount: 0, referralBonus: 0,
        joinedAt: serverTimestamp()
      });
      if(refCode){
        const q = query(collection(db,"users"), where("referralCode","==",refCode));
        const qs = await getDocs(q);
        if(!qs.empty) await updateDoc(qs.docs[0].ref,{points:increment(50),totalMined:increment(50),referralCount:increment(1),referralBonus:increment(50)});
        await updateDoc(ref,{points:increment(50),totalMined:increment(50)});
      }
    }
  } catch(e){ console.error("DB error:", e); }
}

// CEK AUTH - hanya redirect ke dashboard kalau sudah login
// ── TELEGRAM AUTO LOGIN ───────────────────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if(tg && tg.initDataUnsafe?.user){
  // Dibuka dari Telegram Mini App
  tg.ready();
  tg.expand();
  tg.setBackgroundColor("#0a0c0f");

  const tgUser = tg.initDataUnsafe.user;
  const tgUid = "tg_" + tgUser.id; // ID unik pakai prefix tg_
  const tgName = [tgUser.first_name, tgUser.last_name].filter(Boolean).join(" ") || "Miner";
  const tgEmail = tgUid + "@telegram.guppy"; // email virtual

  // Cek ref dari start_param Telegram
  const tgRef = tg.initDataUnsafe.start_param || sessionStorage.getItem("pendingRef") || "";

  // Simpan data Telegram ke localStorage agar dashboard bisa baca
  localStorage.setItem("tg_user", JSON.stringify({ uid: tgUid, name: tgName, tgId: tgUser.id, photo: tgUser.photo_url || "" }));

  // Login atau daftar otomatis pakai Firebase Custom Token via email virtual
  (async () => {
    try{
      // Coba login dulu
      try{
        await signInWithEmailAndPassword(auth, tgEmail, "tg_" + tgUser.id + "_guppy");
        goToDashboard();
        return;
      } catch(e){ /* belum punya akun, lanjut daftar */ }

      // Daftar akun baru
      const cred = await createUserWithEmailAndPassword(auth, tgEmail, "tg_" + tgUser.id + "_guppy");
      await updateProfile(cred.user, { displayName: tgName, photoURL: tgUser.photo_url || "" });
      await saveUserToDB(cred.user, tgRef.toUpperCase());
      goToDashboard();
    } catch(e){
      console.error("Telegram login error:", e);
      // Kalau gagal, tampilkan form login biasa
      showLoginPage();
    }
  })();
} else {
  // Bukan dari Telegram, cek auth biasa
  // Timeout 3 detik — kalau Firebase lambat, tampilkan halaman login langsung
  const authTimeout = setTimeout(()=>{
    if(!authChecked){ authChecked = true; showLoginPage(); }
  }, 3000);
  onAuthStateChanged(auth, (user)=>{
    if(authChecked) return;
    authChecked = true;
    clearTimeout(authTimeout);
    if(user){ goToDashboard(); } else { showLoginPage(); }
  });
}
// ──────────────────────────────────────────────────────────────────────────────

// Cek ref code di URL
const urlRef = new URLSearchParams(window.location.search).get("ref");
if(urlRef){
  sessionStorage.setItem("pendingRef", urlRef.toUpperCase());
}

window.switchTab = function(tab){
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".form").forEach(f=>f.classList.remove("active"));
  document.getElementById("tab-"+tab).classList.add("active");
  document.getElementById("form-"+tab).classList.add("active");
  clearErr();
};

window.doLogin = async function(){
  const email = document.getElementById("login-email").value.trim();
  const pass = document.getElementById("login-password").value;
  if(!email||!pass) return showErr("Isi email dan password dulu!");
  showOverlay(); clearErr();
  try{
    await signInWithEmailAndPassword(auth, email, pass);
    goToDashboard();
  } catch(e){
    if(e.code==="auth/invalid-credential"||e.code==="auth/wrong-password") showErr("Email atau password salah!");
    else if(e.code==="auth/user-not-found") showErr("Akun tidak ditemukan!");
    else showErr(e.message);
  }
};

window.doRegister = async function(){
  const name = document.getElementById("reg-name").value.trim();
  const email = document.getElementById("reg-email").value.trim();
  const pass = document.getElementById("reg-password").value;
  const refCode = document.getElementById("reg-referral").value.trim().toUpperCase();
  if(!name||!email||!pass) return showErr("Semua field wajib diisi!");
  if(pass.length<6) return showErr("Password minimal 6 karakter!");
  showOverlay(); clearErr();
  try{
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, {displayName: name});
    await saveUserToDB(cred.user, refCode);
    goToDashboard();
  } catch(e){
    if(e.code==="auth/email-already-in-use") showErr("Email sudah terdaftar!");
    else showErr(e.message);
  }
};

// GOOGLE LOGIN - pakai popup saja (lebih stabil di semua browser)
window.doGoogleLogin = async function(){
  clearErr(); showOverlay();
  try{
    const result = await signInWithPopup(auth, gProvider);
    const refCode = sessionStorage.getItem("pendingRef") || "";
    sessionStorage.removeItem("pendingRef");
    await saveUserToDB(result.user, refCode);
    goToDashboard();
  } catch(e){
    hideOverlay();
    if(e.code === "auth/popup-blocked"){
      showErr("Popup diblokir browser! Coba matikan popup blocker atau gunakan email/password.");
    } else if(e.code === "auth/cancelled-popup-request" || e.code === "auth/popup-closed-by-user"){
      showErr("Login dibatalkan.");
    } else {
      showErr(e.message);
    }
  }
};
</script>
</body>
</html>
